{% extends "base.html" %}

{% block content %}

<div class="container">

    <h1>Create Account</h1>

    <p>
        Register to use AI Study Assistant.
    </p>

    <form method="POST">

        <input
            class="file-input"
            type="text"
            name="username"
            placeholder="Username"
            required
        >

        <input
            class="file-input"
            type="password"
            name="password"
            placeholder="Password"
            required
        >

        <button type="submit">
            Register
        </button>

    </form>

    <p style="margin-top:20px;">
        {{ message }}
    </p>

</div>

{% endblock %}
